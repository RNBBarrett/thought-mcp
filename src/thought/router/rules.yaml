# Router rule set — VIBE / FACT / CHANGE classification.
# Triggers are case-insensitive. Multiple matches across classes promote to HYBRID.

vibe:
  # Similarity / mood / association language.
  - "\\bsimilar to\\b"
  - "\\blike this\\b"
  - "\\breminds me\\b"
  - "\\bfind something\\b"
  - "\\brelated to\\b"
  - "\\bvibe of\\b"
  - "\\bkind of like\\b"
  - "\\bsomething like\\b"

fact:
  - "^who\\b"
  - "^where\\b"
  - "^which\\b"
  - "^what is\\b"
  - "^what's\\b"
  - "\\bowns\\b"
  - "\\bowned by\\b"
  - "\\bpart of\\b"
  - "\\breports to\\b"
  - "\\bdepends on\\b"
  - "\\bworks at\\b"

change:
  - "\\bwhen\\b"
  - "\\bsince\\b"
  - "\\bused to\\b"
  - "\\bpreviously\\b"
  - "\\bhistorically\\b"
  - "\\bin \\d{4}\\b"
  - "\\bas of\\b"
  - "\\bsuperseded\\b"
  - "\\bdeprecated\\b"
  - "\\bever\\b"
  - "\\bbefore\\b"
  - "\\bafter\\b"
  - "\\bhistory of\\b"
  - "\\bcurrently\\b"
  - "\\bnow\\b"
  - "\\btoday\\b"
  - "\\bpresent\\b"
  - "\\bnowadays\\b"

# v0.2 — code-vertical query triggers.
# CODE class signals the dispatcher to use CodeLayer methods (callers,
# callees, impact) instead of generic graph/vector retrieval. A CODE
# query crossed with CHANGE triggers HYBRID (e.g. "what changed in
# auth.middleware since v1.0").
code:
  - "\\bfunction\\b"
  - "\\bclass\\b"
  - "\\bmethod\\b"
  - "\\bmodule\\b"
  - "\\bimport\\b"
  - "\\bcalls?\\b"
  - "\\bcallers?\\b"
  - "\\bcallees?\\b"
  - "\\bimpact( of)?\\b"
  - "\\bwho calls\\b"
  - "\\bdepends? on\\b"
  - "\\bsubclass(es)?\\b"
  - "\\binherits? from\\b"
  - "\\boverrides?\\b"
  - "\\bdefined in\\b"
  - "\\b\\w+\\.(py|ts|tsx|js|jsx|mjs|cjs|go|rs|java|cpp|h|hpp)\\b"
  - "\\bsince commit\\b"
  - "\\bsince v\\d"
  - "\\brefactor(ing)?\\b"
